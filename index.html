<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Name | Personal Website</title>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Your Name — Personal Site</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Sans+3:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
/* ── TOKENS ── */
:root{
  --bg:#f8f6f1;--sidebar-bg:#1c1c1e;--sidebar-w:300px;
  --ink:#1a1812;--muted:#6b6457;--faint:#b5aca0;
  --accent:#7c3d28;--accent2:#3d6b7c;
  --border:#e2ddd5;--card:#fff;--tag:#ede9e2;
  --serif:'Lora','Noto Serif SC',Georgia,serif;
  --sans:'Source Sans 3','Noto Serif SC',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;font-size:15px;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:400;line-height:1.75;display:flex;min-height:100vh;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--sidebar-bg);position:fixed;top:0;left:0;display:flex;flex-direction:column;padding:0 0 2rem;overflow-y:auto;z-index:200;transition:transform .3s ease;}
.sb-profile{padding:2.2rem 1.6rem 1.4rem;border-bottom:1px solid rgba(255,255,255,.08);text-align:center;}
.sb-avatar{width:96px;height:96px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.18);margin:0 auto .9rem;display:block;background:linear-gradient(135deg,#3a2a1e,#7c3d28);font-size:2.8rem;line-height:96px;text-align:center;overflow:hidden;}
.sb-name{color:#f0ede8;font-family:var(--serif);font-size:1.05rem;font-weight:500;margin-bottom:.25rem;}
.sb-title{color:rgba(255,255,255,.45);font-size:.71rem;letter-spacing:.09em;text-transform:uppercase;line-height:1.5;}
.sb-inst{color:rgba(255,255,255,.32);font-size:.74rem;margin-top:.3rem;line-height:1.5;}
.sb-contact{padding:.75rem 1.6rem 1rem;border-bottom:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:.22rem;}
.sb-contact a{color:rgba(255,255,255,.42);font-size:.78rem;display:flex;align-items:center;gap:.6rem;transition:color .2s;padding:.1rem 0;}
.sb-link-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-expand-arrow{margin-left:auto;font-size:.85rem;color:rgba(255,255,255,.25);transition:transform .2s;flex-shrink:0;}
.sb-expand-arrow.open{transform:rotate(90deg);}
.sb-contact-detail{display:none;font-size:.72rem;color:rgba(255,255,255,.55);padding:.18rem 0 .18rem 1.6rem;font-family:var(--mono);letter-spacing:.04em;user-select:all;}
.sb-contact-detail.open{display:block;}
.sb-contact a:hover{color:rgba(255,255,255,.9);}
.sb-contact .icon{width:14px;text-align:center;font-style:normal;opacity:.7;flex-shrink:0;}
.sb-nav{padding:1rem 0 .5rem;flex:1;}
.sb-nav-section{padding:.2rem 1.6rem .15rem;font-size:.61rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-top:.5rem;}
.sb-nav a{display:flex;align-items:center;gap:.6rem;padding:.52rem 1.6rem;color:rgba(255,255,255,.52);font-size:.83rem;letter-spacing:.02em;transition:color .15s,background .15s;border-left:2px solid transparent;}
.sb-nav a:hover{color:#fff;background:rgba(255,255,255,.05);}
.sb-nav a.active{color:#fff;border-left-color:var(--accent);background:rgba(255,255,255,.07);}
.nav-icon{font-style:normal;font-size:.88rem;width:18px;text-align:center;}
.sb-lang{margin:1.2rem 1.6rem 0;display:flex;border:1px solid rgba(255,255,255,.15);border-radius:4px;overflow:hidden;}
.sb-lang button{flex:1;background:transparent;border:none;color:rgba(255,255,255,.38);font-family:var(--sans);font-size:.71rem;letter-spacing:.08em;text-transform:uppercase;padding:.42rem .3rem;cursor:pointer;transition:all .2s;}
.sb-lang button.on{background:var(--accent);color:#fff;}

/* ── MAIN ── */
#main{margin-left:var(--sidebar-w);flex:1;min-width:0;min-height:100vh;display:flex;flex-direction:column;}
#topbar{display:none;position:sticky;top:0;z-index:150;background:var(--sidebar-bg);padding:.7rem 1.2rem;align-items:center;justify-content:space-between;}
#topbar .tb-name{color:#f0ede8;font-family:var(--serif);font-size:.95rem;}
#menu-btn{background:none;border:none;cursor:pointer;color:#fff;display:flex;flex-direction:column;gap:4px;}
#menu-btn span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;}

/* ── PAGES ── */
.page{display:none;padding:3rem 3.5rem 4rem;max-width:900px;box-sizing:border-box;}
.page.active{display:block;}
.sec-eye{font-size:.67rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.4rem;}
.sec-h1{font-family:var(--serif);font-size:2rem;font-weight:500;line-height:1.2;margin-bottom:.5rem;}
.sec-rule{width:36px;height:2px;background:var(--accent);margin-bottom:2rem;}

/* ── HOME HERO ── */
.home-hero{padding-bottom:2.5rem;border-bottom:1px solid var(--border);margin-bottom:2.5rem;}
.home-greeting{font-family:var(--serif);font-size:clamp(1.7rem,3vw,2.4rem);font-weight:500;line-height:1.25;margin-bottom:1rem;}
.home-greeting em{color:var(--accent);font-style:italic;}
.home-bio{color:var(--muted);font-size:.94rem;max-width:580px;line-height:1.85;}
.home-links{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:1.5rem;}
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.48rem 1.1rem;border-radius:3px;font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;transition:all .2s;cursor:pointer;border:none;font-family:var(--sans);}
.btn-solid{background:var(--accent);color:#fff;}
.btn-solid:hover{background:#6a3320;}
.btn-out{border:1px solid var(--border);color:var(--muted);background:transparent;}
.btn-out:hover{border-color:var(--ink);color:var(--ink);}
.home-block{margin-bottom:2.5rem;}
.home-block-title{font-family:var(--serif);font-size:1.12rem;font-weight:500;margin-bottom:.85rem;display:flex;align-items:center;gap:.6rem;}
.home-block-title::after{content:'';flex:1;height:1px;background:var(--border);}
.home-body{color:var(--muted);font-size:.91rem;line-height:1.85;}
.research-tags{display:flex;gap:.5rem;flex-wrap:wrap;}
.rtag{background:var(--tag);border:1px solid var(--border);padding:.32rem .75rem;border-radius:2px;font-size:.77rem;color:var(--ink);}
.act-list{list-style:none;}
.act-list li{padding:.52rem 0;border-bottom:1px solid var(--border);display:grid;grid-template-columns:80px 1fr;gap:0 1rem;font-size:.87rem;}
.act-list li:last-child{border-bottom:none;}
.act-year{color:var(--faint);font-family:var(--mono);font-size:.77rem;padding-top:.05rem;}
.act-detail{color:var(--muted);}
.act-detail strong{color:var(--ink);font-weight:500;}
.act-sub{font-family:var(--serif);font-size:.88rem;font-weight:500;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.5rem;margin-top:1.2rem;}

/* ── PUBLICATIONS ── */
.pub-section-header{margin-bottom:1.2rem;}
.pub-main-title{font-family:var(--serif);font-size:1.12rem;font-weight:500;line-height:1.4;margin-bottom:.5rem;}
.pub-view-toggles{font-family:var(--sans);font-size:.78rem;font-weight:300;}
.pub-toggle-link{color:var(--accent2);cursor:pointer;}
.pub-toggle-link.active-toggle{color:var(--accent);font-weight:500;text-decoration:underline;}
.pub-toggle-link:hover{text-decoration:underline;}
.pub-topics-line{font-size:.82rem;color:var(--muted);line-height:1.8;margin-top:.3rem;}
.pub-topics-line strong{color:var(--ink);}
.topic-link{color:var(--accent2);cursor:pointer;}
.topic-link:hover{text-decoration:underline;color:var(--accent);}
.past-topic{color:var(--muted);}
.contrib-note{color:var(--faint);font-size:.76rem;}
.pub-topic-label{font-family:var(--serif);font-size:1.05rem;font-weight:500;color:var(--ink);padding:.5rem 1rem;margin-top:.8rem;border-left:3px solid var(--accent);background:var(--tag);border-radius:0 3px 3px 0;margin-bottom:.3rem;}
.pub-topic-group{margin-bottom:1.5rem;}
.pub-year-group{margin-bottom:2rem;}
.pub-year-label{font-family:var(--mono);font-size:.71rem;color:var(--faint);letter-spacing:.1em;border-bottom:1px solid var(--border);padding-bottom:.35rem;margin-bottom:.9rem;}

/* ── PUB ITEM — with thumbnail ── */
.pub-item{display:grid;grid-template-columns:80px 1fr;gap:0 1rem;padding:.85rem 0;border-bottom:1px solid var(--border);align-items:start;}
.pub-item:last-child{border-bottom:none;}
.pub-thumb{width:80px;height:64px;border-radius:4px;object-fit:cover;background:var(--tag);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.pub-thumb img{width:100%;height:100%;object-fit:cover;border-radius:4px;}
.pub-body{}
.pub-title{font-family:var(--serif);font-size:.96rem;font-weight:500;color:var(--ink);line-height:1.4;margin-bottom:.22rem;}
.pub-authors{font-size:.79rem;color:var(--muted);margin-bottom:.18rem;}
.pub-authors strong{color:var(--ink);font-weight:600;}
.pub-venue{font-size:.77rem;font-style:italic;color:var(--accent2);}
.pub-tags{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.4rem;}
.pub-tag{background:var(--tag);border:1px solid var(--border);font-size:.64rem;letter-spacing:.07em;text-transform:uppercase;padding:.13rem .44rem;border-radius:2px;color:var(--muted);}
.pub-links{display:flex;gap:.5rem;margin-top:.45rem;}
.pub-link{font-size:.71rem;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);}
.pub-link:hover{text-decoration:underline;}

/* ── CARD GRID (recipes, cocktails, projects) ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.1rem;}
.card-item{background:var(--card);border:1px solid var(--border);border-radius:7px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;}
.card-item:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.09);}
.card-thumb{width:100%;height:140px;background:var(--tag);display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;overflow:hidden;}
.card-thumb img{width:100%;height:100%;object-fit:cover;}
.card-thumb .card-thumb-emoji{font-size:3rem;}
.card-body{padding:1rem 1.2rem 1.1rem;}
.card-meta{font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:.25rem;}
.card-title{font-family:var(--serif);font-size:1rem;font-weight:500;line-height:1.3;margin-bottom:.3rem;}
.card-desc{font-size:.82rem;color:var(--muted);line-height:1.6;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.75rem;padding-top:.65rem;border-top:1px solid var(--border);}
.card-stats{display:flex;gap:.9rem;}
.card-stat{font-size:.71rem;color:var(--muted);}
.card-stat strong{color:var(--ink);font-weight:500;}
.card-rating{color:var(--accent);font-size:.78rem;}
.card-arrow{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--accent2);}

/* ── BOOK GRID ── */
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.1rem;}
.book-item{background:var(--card);border:1px solid var(--border);border-radius:7px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;}
.book-item:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.09);}
.book-cover{width:100%;height:120px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative;}
.book-body{padding:.9rem 1.1rem 1rem;flex:1;display:flex;flex-direction:column;}
.bk-meta{font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:.2rem;}
.bk-title{font-family:var(--serif);font-size:.97rem;font-weight:500;line-height:1.35;margin-bottom:.12rem;}
.bk-author{font-size:.77rem;color:var(--muted);margin-bottom:.3rem;}
.bk-rating{color:var(--accent);font-size:.82rem;}
.bk-notes{font-size:.81rem;color:var(--muted);line-height:1.6;margin-top:.4rem;flex:1;}
.bk-more{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--accent2);margin-top:.7rem;}

/* ── PHOTOGRAPHY ── */
.photo-topics{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.6rem;}
.photo-topic-btn{background:var(--tag);border:1px solid var(--border);padding:.3rem .85rem;border-radius:20px;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;color:var(--muted);transition:all .2s;font-family:var(--sans);}
.photo-topic-btn.on,.photo-topic-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.photo-grid{columns:3;gap:.7rem;}
.photo-grid .photo-cell{break-inside:avoid;margin-bottom:.7rem;border-radius:5px;overflow:hidden;cursor:pointer;position:relative;}
.photo-cell img,.photo-cell .photo-placeholder{width:100%;display:block;border-radius:5px;}
.photo-placeholder{background:var(--tag);min-height:120px;display:flex;align-items:center;justify-content:center;font-size:2rem;border:1px solid var(--border);}
.photo-caption{font-size:.74rem;color:var(--muted);margin-top:.3rem;line-height:1.4;}
@media(max-width:640px){.photo-grid{columns:2;}}

/* ── TAROT ── */
.tarot-intro{color:var(--muted);font-size:.91rem;line-height:1.85;max-width:580px;margin-bottom:2rem;}
.tarot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:1rem;}
.tarot-card-wrap{cursor:pointer;}
.tarot-card{width:100%;aspect-ratio:2/3.5;border-radius:8px;background:linear-gradient(135deg,#1c1c1e,#3a2a1e);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:2.2rem;position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s;}
.tarot-card:hover{transform:translateY(-4px) rotate(-1deg);box-shadow:0 12px 32px rgba(0,0,0,.18);}
.tarot-card .tc-number{position:absolute;top:.5rem;left:.6rem;font-family:var(--mono);font-size:.62rem;color:rgba(255,255,255,.35);}
.tarot-card .tc-symbol{font-size:2.4rem;margin-bottom:.3rem;}
.tarot-card .tc-name{font-family:var(--serif);font-size:.7rem;color:rgba(255,255,255,.7);text-align:center;padding:0 .4rem;line-height:1.3;}
.tarot-card-label{font-family:var(--serif);font-size:.8rem;color:var(--muted);text-align:center;margin-top:.4rem;line-height:1.3;}

/* ── DETAIL MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg);border-radius:10px;max-width:680px;width:100%;margin:auto;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:modalIn .22s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.modal-hero{width:100%;height:220px;background:var(--tag);display:flex;align-items:center;justify-content:center;font-size:5rem;position:relative;overflow:hidden;}
.modal-hero img{width:100%;height:100%;object-fit:cover;}
.modal-close{position:absolute;top:.9rem;right:1rem;background:rgba(0,0,0,.4);color:#fff;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.modal-close:hover{background:rgba(0,0,0,.7);}
.modal-content{padding:1.8rem 2rem 2.2rem;}
.modal-eyebrow{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:.4rem;}
.modal-title{font-family:var(--serif);font-size:1.5rem;font-weight:500;line-height:1.25;margin-bottom:.6rem;}
.modal-meta-row{display:flex;gap:1.2rem;flex-wrap:wrap;margin-bottom:1.2rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.modal-meta{font-size:.78rem;color:var(--muted);}
.modal-meta strong{color:var(--ink);}
.modal-section{margin-bottom:1.4rem;}
.modal-section-title{font-family:var(--serif);font-size:.95rem;font-weight:500;margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem;}
.modal-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.modal-body{font-size:.88rem;color:var(--muted);line-height:1.85;}
.modal-body p{margin-bottom:.6rem;}
.modal-body p:last-child{margin-bottom:0;}
.step-list{list-style:none;}
.step-list li{display:grid;grid-template-columns:28px 1fr;gap:0 .8rem;padding:.55rem 0;border-bottom:1px solid var(--border);font-size:.87rem;color:var(--muted);}
.step-list li:last-child{border-bottom:none;}
.step-num{font-family:var(--mono);font-size:.72rem;color:var(--accent);padding-top:.15rem;}
.ingr-list{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:.3rem .8rem;}
.ingr-list li{font-size:.85rem;color:var(--muted);padding:.25rem 0;border-bottom:1px solid var(--border);}
.ingr-list li:last-child,.ingr-list li:nth-last-child(2):nth-child(odd){border-bottom:none;}
.ingr-list li strong{color:var(--ink);}

/* ── TAROT MODAL EXTRA ── */
.tarot-modal-card{width:90px;aspect-ratio:2/3.5;border-radius:7px;background:linear-gradient(135deg,#1c1c1e,#3a2a1e);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:.4rem;border:1px solid rgba(255,255,255,.1);}
.tarot-meanings{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-top:.6rem;}
.tarot-meaning-box{background:var(--tag);border:1px solid var(--border);border-radius:5px;padding:.8rem 1rem;}
.tarot-meaning-title{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:.3rem;}
.tarot-meaning-body{font-size:.83rem;color:var(--muted);line-height:1.6;}

footer{padding:1.4rem 3.5rem;border-top:1px solid var(--border);font-size:.72rem;color:var(--faint);letter-spacing:.05em;margin-top:auto;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190;}
.overlay.show{display:block;}

@media(max-width:768px){
  #sidebar{transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  #main{margin-left:0;}
  #topbar{display:flex;}
  .page{padding:1.8rem 1.3rem 3rem;}
  .card-grid,.book-grid{grid-template-columns:1fr 1fr;}
  footer{padding:1.2rem 1.3rem;}
  .modal-content{padding:1.3rem 1.3rem 1.8rem;}
  .ingr-list{grid-template-columns:1fr;}
  .tarot-meanings{grid-template-columns:1fr;}
}
@media(max-width:480px){
  .card-grid,.book-grid,.tarot-grid{grid-template-columns:1fr 1fr;}
}

/* ── GUITAR ── */
.guitar-filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.6rem;}
.guitar-list{display:flex;flex-direction:column;gap:0;}
.guitar-item{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.9rem 0;border-bottom:1px solid var(--border);transition:background .15s;}
.guitar-item:hover{background:rgba(124,61,40,.04);}
.guitar-item:last-child{border-bottom:none;}
.guitar-item-left{flex:1;min-width:0;}
.guitar-item-right{display:flex;align-items:center;gap:1rem;flex-shrink:0;}
.guitar-genre-tag{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:.18rem;}
.guitar-title{font-family:var(--serif);font-size:1rem;font-weight:500;color:var(--ink);line-height:1.3;margin-bottom:.12rem;}
.guitar-artist{font-size:.8rem;color:var(--muted);}
.guitar-diff{font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;padding:.22rem .6rem;border-radius:20px;white-space:nowrap;}
.guitar-diff-easy{background:#e8f4ee;color:#2a6b3f;}
.guitar-diff-med{background:#fdf3e3;color:#8b5e1a;}
.guitar-diff-hard{background:#fae8e8;color:#8b1a1a;}
.guitar-links{display:flex;gap:.5rem;}
.guitar-link{font-size:.72rem;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);border:1px solid var(--border);padding:.2rem .55rem;border-radius:3px;white-space:nowrap;transition:all .15s;}
.guitar-link:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

<body>

<!-- ══════════════════════════════════════════════════════
     SIDEBAR — edit sections/_sidebar.html
     (name, email, links, avatar photo)
════════════════════════════════════════════════════════ -->
<div id="overlay" onclick="closeSidebar()"></div>
